<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Dashboard for Yoyo</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-deep:#f5f7fb;--bg-card:#ffffff;--border-subtle:rgba(0,0,0,0.06);
    --text-primary:#1a1f2e;--text-secondary:#5a6378;--text-dim:#9aa1b2;
    --gold:#f0b90b;--gold-glow:rgba(240,185,11,0.25);--cyan:#00d4aa;--cyan-glow:rgba(0,212,170,0.25);
    --blue:#4d8af0;--blue-glow:rgba(77,138,240,0.25);--purple:#a277ff;--purple-glow:rgba(162,119,255,0.25);
    --pink:#ff6b9d;--red-soft:#ff5577;--radius:14px;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
    background:var(--bg-deep);
    background-image:radial-gradient(ellipse 80% 60% at 30% 20%,rgba(77,138,240,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 70% at 75% 65%,rgba(162,119,255,0.04) 0%,transparent 60%);
    color:var(--text-primary);min-height:100vh;padding:24px;display:flex;justify-content:center;
  }
  .dashboard{width:100%;max-width:1140px;display:flex;flex-direction:column;gap:14px}

  .header{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
  .header .logo{font-size:1.6rem;font-weight:700;letter-spacing:.04em;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header .tagline{font-size:.82rem;color:var(--text-dim);letter-spacing:.05em}

  .card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);position:relative;overflow:hidden;transition:box-shadow .3s,border-color .3s}
  .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;border-radius:var(--radius) var(--radius) 0 0}
  .card:hover{border-color:rgba(0,0,0,.12);box-shadow:0 2px 6px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05)}
  .card-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .card-title .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .card-title-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}

  /* Salary */
  .card-salary::before{background:linear-gradient(90deg,var(--gold),#ff8c00)}
  .card-salary .card-title{color:var(--gold)}
  .card-salary .card-title .dot{background:var(--gold);box-shadow:0 0 8px var(--gold-glow)}

  .salary-top-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .salary-stat{flex:1;min-width:70px;text-align:center;padding:6px 3px;background:rgba(0,0,0,.025);border-radius:6px}
  .salary-stat .stat-val{font-size:.9rem;font-weight:700;color:#1a1f2e}
  .salary-stat .stat-label{font-size:.6rem;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:.03em}
  .salary-stat.highlight .stat-val{color:#1a1f2e}

  /* Year tabs */
  .year-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .year-tab{background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.08);color:var(--text-secondary);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:.68rem;letter-spacing:.03em;transition:all .2s}
  .year-tab:hover,.year-tab.active{background:rgba(240,185,11,.12);border-color:#d4a000;color:#8a6500}

  .chart-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px}
  .chart-box{flex:2;min-width:340px}
  .chart-box .chart-title{font-size:.64rem;color:var(--text-dim);letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase}
  canvas{width:100%;display:block}
  #salaryChart{height:180px}
  .pie-box{flex:1;min-width:200px}
  .pie-box .chart-title{font-size:.68rem;color:var(--text-dim);letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase}
  #salaryPie{height:180px}

  /* Annual table */
  .annual-table-wrap{margin-bottom:8px;overflow-x:auto}
  .annual-table{width:100%;border-collapse:collapse;font-size:.65rem}
  .annual-table th{background:rgba(0,0,0,.06);color:var(--text-dim);font-weight:500;padding:4px 6px;text-align:right;white-space:nowrap;letter-spacing:.02em}
  .annual-table th:first-child{text-align:center}
  .annual-table td{padding:3px 6px;text-align:right;border-bottom:1px solid rgba(0,0,0,0.02);white-space:nowrap;color:var(--text-primary)}
  .annual-table td:first-child{text-align:center;font-weight:600}
  .annual-table tbody tr:hover{background:rgba(0,0,0,0.02)}
  .annual-table .col-up{color:var(--text-primary)}
  .annual-table .col-down{color:var(--text-primary)}
  .annual-table .col-total{font-weight:600}

  /* Monthly table */
  .salary-table-wrap{max-height:240px;overflow-y:auto;border-radius:6px}
  .salary-table-wrap::-webkit-scrollbar{width:4px}
  .salary-table-wrap::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.06);border-radius:2px}
  .salary-table{width:100%;border-collapse:collapse;font-size:.65rem}
  .salary-table thead{position:sticky;top:0;z-index:1}
  .salary-table th{background:rgba(0,0,0,.06);color:var(--text-dim);font-weight:500;padding:4px 6px;text-align:right;white-space:nowrap;letter-spacing:.02em}
  .salary-table th:first-child,.salary-table th:nth-child(2){text-align:center}
  .salary-table td{padding:3px 6px;text-align:right;border-bottom:1px solid rgba(0,0,0,0.02);white-space:nowrap;color:var(--text-primary)}
  .salary-table td:first-child,.salary-table td:nth-child(2){text-align:center}
  .salary-table tbody tr:hover{background:rgba(0,0,0,0.02)}
  .col-total{font-weight:600}
  .col-real{font-weight:600}
  .col-deduct{}
  .year-sep td{background:#fff!important;color:var(--text-dim);font-size:.65rem;text-align:center!important;letter-spacing:.04em;padding:4px 6px;font-weight:600;border-bottom:1px solid rgba(0,0,0,.06)}
  .salary-table .row-2026 td{background:rgba(0,0,0,.02)}

  .salary-upload-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .salary-upload-btn{background:rgba(240,185,11,.1);border:1px solid rgba(240,185,11,.25);color:#b08500;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:.68rem;letter-spacing:.03em;transition:background .2s}
  .salary-upload-btn:hover{background:rgba(240,185,11,.15)}
  .salary-source{font-size:.7rem;color:var(--text-dim)}
  #salaryFileInput{display:none}

  /* Grid */
  .grid-main{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  /* Clock */
  .card-clock::before{background:linear-gradient(90deg,var(--blue),var(--purple))}
  .card-clock .card-title{color:var(--blue)}
  .card-clock .card-title .dot{background:var(--blue);box-shadow:0 0 8px var(--blue-glow)}
  .clock-display{text-align:center;padding:8px 0 4px}
  .clock-time{font-size:2.4rem;font-weight:300;letter-spacing:.04em;font-variant-numeric:tabular-nums;font-family:"SF Mono","JetBrains Mono","Fira Code",monospace;color:#1a1f2e}
  .clock-date{font-size:.8rem;color:var(--text-secondary);margin-top:4px;letter-spacing:.04em}
  .clock-weekday{display:inline-block;background:rgba(77,138,240,.12);color:#2563eb;padding:2px 10px;border-radius:10px;font-size:.7rem;margin-top:6px}

  /* Todo */
  .card-todo::before{background:linear-gradient(90deg,var(--cyan),#00e0b0)}
  .card-todo .card-title{color:var(--cyan)}
  .card-todo .card-title .dot{background:var(--cyan);box-shadow:0 0 8px var(--cyan-glow)}
  .todo-input-row{display:flex;gap:10px;margin-bottom:14px}
  .todo-input-row input{flex:1;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:8px;padding:9px 14px;color:var(--text-primary);font-size:.9rem;outline:none;transition:border-color .2s}
  .todo-input-row input:focus{border-color:var(--cyan)}
  .todo-input-row input::placeholder{color:var(--text-dim)}
  .todo-input-row button{background:linear-gradient(135deg,var(--cyan),#00b894);border:none;border-radius:8px;color:#0a0e17;font-weight:700;padding:9px 18px;cursor:pointer;font-size:.85rem;letter-spacing:.04em;transition:opacity .2s,transform .15s}
  .todo-input-row button:hover{opacity:.85}
  .todo-input-row button:active{transform:scale(.96)}
  .todo-list{list-style:none;max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
  .todo-list::-webkit-scrollbar{width:4px}
  .todo-list::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.06);border-radius:2px}
  .todo-list li{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(0,0,0,0.02);border-radius:8px;transition:background .2s}
  .todo-list li:hover{background:rgba(0,0,0,0.04)}
  .todo-list li .check{width:20px;height:20px;border:2px solid rgba(0,0,0,0.12);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.7rem;color:transparent}
  .todo-list li.done .check{background:var(--cyan);border-color:var(--cyan);color:#0a0e17}
  .todo-list li .text{flex:1;font-size:.9rem;transition:color .2s,text-decoration .2s}
  .todo-list li.done .text{text-decoration:line-through;color:var(--text-dim)}
  .todo-list li .del{width:24px;height:24px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:4px;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:color .2s,background .2s;flex-shrink:0}
  .todo-list li .del:hover{color:var(--red-soft);background:rgba(255,85,119,.1)}
  .todo-empty{text-align:center;color:var(--text-dim);font-size:.82rem;padding:20px 0}

  /* Links */
  .card-links::before{background:linear-gradient(90deg,var(--pink),var(--purple))}
  .card-links .card-title{color:var(--purple)}
  .card-links .card-title .dot{background:var(--purple);box-shadow:0 0 8px var(--purple-glow)}
  .links-grid{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px}
  .link-chip{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.06);border-radius:10px;cursor:pointer;transition:all .25s;text-decoration:none;color:var(--text-primary);font-size:.88rem;position:relative}
  .link-chip:hover{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08)}
  .link-chip .link-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.02em;text-shadow:0 1px 2px rgba(0,0,0,.15)}
  .link-chip .link-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red-soft);color:#fff;border:none;font-size:.65rem;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
  .link-chip:hover .link-del{display:flex}
  .add-link-row{display:flex;gap:10px}
  .add-link-row input{flex:1;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:8px;padding:8px 14px;color:var(--text-primary);font-size:.85rem;outline:none;min-width:0}
  .add-link-row input:focus{border-color:var(--purple)}
  .add-link-row input::placeholder{color:var(--text-dim);font-size:.8rem}
  .add-link-row button{background:linear-gradient(135deg,var(--purple),#7c5ce7);border:none;border-radius:8px;color:#fff;font-weight:700;padding:8px 16px;cursor:pointer;font-size:.85rem;letter-spacing:.04em;transition:opacity .2s,transform .15s;flex-shrink:0}
  .add-link-row button:hover{opacity:.85}
  .add-link-row button:active{transform:scale(.96)}

  /* ===== ima 知识库 Card ===== */
  .card-ima::before{background:linear-gradient(90deg,#10b981,#059669)}
  .card-ima .card-title{color:#10b981}
  .card-ima .card-title .dot{background:#10b981;box-shadow:0 0 8px rgba(16,185,129,.25)}
  .card-ima .card-title{margin-bottom:10px;position:relative}
  .ima-kb-icon-link{position:absolute;right:30px;top:50%;transform:translateY(-50%);font-size:.85rem;text-decoration:none;opacity:.6;transition:opacity .2s}
  .ima-kb-icon-link:hover{opacity:1}

  /* ===== 体重日历 Card ===== */
  .card-weight::before{background:linear-gradient(90deg,#fb7185,#f43f5e)}
  .card-weight .card-title{color:#fb7185}
  .card-weight .card-title .dot{background:#fb7185;box-shadow:0 0 8px rgba(251,113,133,.25)}
  .weight-stats{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .weight-stat{flex:1;min-width:90px;background:rgba(251,113,133,.06);border:1px solid rgba(251,113,133,.15);border-radius:6px;padding:8px 6px;text-align:center}
  .weight-stat .v{font-size:1rem;font-weight:700;color:#fb7185}
  .weight-stat .l{font-size:.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .weight-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .weight-cal-title{font-size:.78rem;font-weight:600;color:var(--text-primary)}
  .weight-cal-nav{display:flex;gap:4px}
  .weight-cal-nav button{background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);color:var(--text-secondary);width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:.7rem;transition:all .15s}
  .weight-cal-nav button:hover{background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.3);color:#fb7185}
  .weight-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .weight-cal-weekday{text-align:center;font-size:.6rem;color:var(--text-dim);padding:4px 0;text-transform:uppercase;letter-spacing:.04em}
  .weight-day{aspect-ratio:1/1;border-radius:5px;background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.04);padding:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.7rem;color:var(--text-secondary);position:relative;transition:all .15s}
  .weight-day.empty{background:transparent;border-color:transparent;pointer-events:none}
  .weight-day.today{border:2px solid #fb7185;background:rgba(251,113,133,.18);box-shadow:0 0 10px rgba(251,113,133,.4);animation:today-pulse 2s ease-in-out infinite}
  .weight-day.today .wd{color:#fb7185}
  .weight-day.has-data{background:rgba(251,113,133,.1);border-color:rgba(251,113,133,.25)}
  .weight-day .wd{font-weight:600;color:var(--text-primary);font-size:.7rem;line-height:1}
  .weight-day .ww{font-size:.55rem;color:#fb7185;font-weight:600;line-height:1.2;margin-top:1px}
  .weight-day .wn{font-size:.48rem;color:var(--text-dim);line-height:1;margin-top:1px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  @keyframes today-pulse{0%,100%{box-shadow:0 0 8px rgba(251,113,133,.35)}50%{box-shadow:0 0 14px rgba(251,113,133,.7)}}
  .weight-loading{text-align:center;color:var(--text-dim);font-size:.75rem;padding:20px 0}
  .ima-sync-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.85rem;padding:2px 6px;border-radius:4px;transition:all .2s;line-height:1}
  .ima-sync-btn:hover{color:#10b981;background:rgba(16,185,129,.1)}
  .ima-sync-btn.syncing{animation:spin 1s linear infinite;color:#10b981}
  @keyframes spin{from{transform:translateY(-50%) rotate(0deg)}to{transform:translateY(-50%) rotate(360deg)}}
  .ima-status-bar{font-size:.65rem;color:var(--text-dim);padding:4px 0 2px 0;letter-spacing:.02em;display:flex;align-items:center;gap:6px}
  .ima-status-bar.ok{color:#10b981}
  .ima-status-bar.syncing{color:var(--gold)}
  .ima-status-bar.error{color:var(--red-soft)}
  .ima-start-link{color:var(--gold);text-decoration:underline;cursor:pointer;font-weight:600}
  .ima-start-link:hover{color:#ff8c00}
  .ima-status-bar .sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block}
  .ima-folder{width:100%;margin-top:4px;padding:4px 8px;background:rgba(0,0,0,.15);border-radius:4px;font-size:.66rem;color:var(--text-dim);display:flex;align-items:center;gap:5px}
  .ima-kb-list{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .ima-kb-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;text-decoration:none;color:var(--text-primary);font-size:.78rem;transition:all .2s}
  .ima-kb-chip:hover{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);transform:translateY(-1px)}
  .ima-kb-item{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.04);border-radius:6px;font-size:.74rem;color:var(--text-secondary);cursor:default}
  .ima-kb-note{cursor:pointer!important;border-color:rgba(0,212,170,.25)!important}
  .ima-kb-note:hover{background:rgba(0,212,170,.1)!important;border-color:var(--cyan)!important}
  .ima-note-viewer{margin:6px 0 8px 16px;padding:10px 14px;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,0.04);border-radius:8px;max-height:300px;overflow-y:auto}
  .ima-note-viewer::-webkit-scrollbar{width:3px}
  .ima-note-viewer::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.06);border-radius:2px}
  .ima-note-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(0,0,0,0.04);font-weight:600;font-size:.82rem;color:var(--text-primary)}
  .ima-note-header button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;padding:0 4px;line-height:1}
  .ima-note-header button:hover{color:var(--red-soft)}
  .ima-note-content{font-size:.78rem;color:var(--text-secondary);line-height:1.7;word-break:break-word;max-width:100%}
  .ima-note-content .ima-h1{font-size:1.3rem;font-weight:700;color:#10b981;margin:14px 0 8px;border-bottom:1px solid rgba(16,185,129,.3);padding-bottom:4px}
  .ima-note-content .ima-h2{font-size:1.1rem;font-weight:700;color:var(--text-primary);margin:12px 0 6px}
  .ima-note-content .ima-h3{font-size:.95rem;font-weight:600;color:var(--text-primary);margin:10px 0 4px}
  .ima-note-content .ima-p{margin:6px 0}
  .ima-note-content .ima-hr{border:0;border-top:1px dashed rgba(0,0,0,0.06);margin:12px 0}
  .ima-note-content .ima-bq{border-left:3px solid var(--cyan);padding:6px 12px;margin:8px 0;background:rgba(0,212,170,.05);border-radius:0 6px 6px 0;color:var(--text-secondary)}
  .ima-note-content .ima-pre{background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,0.04);border-radius:6px;padding:8px 12px;overflow-x:auto;margin:8px 0;font-family:"SF Mono",monospace;font-size:.72rem}
  .ima-note-content .ima-code-inline{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:3px;font-family:"SF Mono",monospace;font-size:.85em;color:var(--cyan)}
  .ima-note-content .ima-img{max-width:100%;border-radius:6px;margin:8px 0}
  .ima-note-content .ima-link{color:var(--blue);text-decoration:underline}
  .ima-note-content .ima-link:hover{color:var(--cyan)}
  .ima-note-content mark{background:rgba(240,185,11,.35);color:#5a4500;padding:0 2px;border-radius:2px}
  .ima-kb-chip .kb-icon{font-size:.95rem}
  .ima-kb-chip .kb-count{font-size:.68rem;color:var(--text-dim)}
  .ima-api-toggle{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.7rem;padding:2px 6px;border-radius:4px;margin-top:8px;transition:color .2s}
  .ima-api-toggle:hover{color:var(--text-secondary)}
  .ima-api-row{display:none;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}
  .ima-api-row.show{display:flex}
  .ima-api-row input{background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:6px;padding:5px 8px;color:var(--text-primary);font-size:.72rem;outline:none;min-width:0;flex:1}
  .ima-api-row input:focus{border-color:#10b981}
  .ima-api-row input::placeholder{color:var(--text-dim);font-size:.68rem}

    "7469190575304454": {title:"AIX MBO Setting", content:"AIX MBO Setting\n\nBusiness KPI：测试场景-Easy Analysis Platform上线，并取得良好运营指标 - 30%\n基本目标：完成EA分析平台正式上线，全面覆盖PTE全体工程师用户。实现工程师日常业务全流程线上闭环，覆盖问题上报、深度分析、根因定位、协同处理、整改追踪全链路，沉淀可复用业务价值。上线即标注机制，依托平台标准化数据沉淀，搭建测试场景专属知识库。达成基础运营指标：AI月处理案例500+、平台日活超500人，单条FA故障分析耗时缩短30%。\n\n挑战目标：扩容平台使用范围，实现PTE、TSA全员用户全覆盖。利用平台AI处理能力，达成进阶运营指标：AI月处理案例700+、平台日活超700人，实现平台规模化落地应用。\n\n关键举措：完成系统CLI化、工具技能化改造，对平台能力进行模块化封装，将各类工具转化为可调用技能，支持中央智能体、测试智能体调用，兼容Skills、CLI等多种调用形态，适配生态复用。重点搭建高精度测试知识库，依托平台沉淀业务数据，提升故障分析的精准度和整体效率。打造统一规范、交互清晰的GUI可视化界面，统一业务操作标准，保障信息传递高效准确。基于Workspace搭建统一中央访问入口，简化员工接入方式，提升使用便捷性。搭建实时数据运营监控体系，依托真实运营数据，持续驱动平台功能迭代与体验优化。\n\nQ3 & Q4工作重点：Q3 平台上线与基础落地阶段完成EA平台版本开发、联调与灰度测试，实现平台正式上线，搭建标准化GUI界面与Workspace统一访问入口。完成业务流程线上化改造，打通问题上报、分析、协同、整改追踪全闭环链路，落地数据标注机制，初步搭建测试知识库。完成平台能力模块化、CLI和技能化改造，支持中央智能体、测试智能体调用，完成基础功能生态适配。全面开放PTE用户使用，完成基础推广落地，启动平台运营数据监控，保障基础日活与AI案例处理量稳步达标。Q4 运营提效与规模化迭代阶段持续完善测试知识库，优化AI分析模型，提升AI案例处理数量与故障分析精准度，缩短FA分析耗时。基于运营数据迭代优化平台功能与交互体验，解决用户使用痛点，提升整体使用效率。推进用户范围扩容，完成TSA用户全覆盖，实现平台规模化落地。复盘全年运营指标，固化平台流程、知识库与生态调用能力，形成可长期复用的业务分析体系。\n\nBusiness KPI：测试场景-iTest tool-kit 上线，并取得良好运营指标 - 15%\n基本目标：完成Condition Table全量线上替换，实现PTE全员替换Excel，完成编辑流程统一化、线上化、智能化。完成iTest核心模块开发，覆盖Fuse Control Table、Test Methods、Test Management、DFT、EFA Tools全功能模块。上线AI Skills自然语言编辑能力，支持通过自然语言操作Condition Table，大幅降低人工耗时。实现基础提效目标：110人日活，Condition Table日均业务耗时从2.66小时降至0.5小时，显著减少人力浪费。\n\n挑战目标：MRB = 0，全年由测试程序问题导致的MRB数量归零，全面解决传统离线测试数据混乱、版本不统一、操作繁琐等长期测试顽疾，降低芯片测试直接与间接导致的MRB损失。搭建完善的PTE Skill开放生态，实现iTest与EA系统深度打通、能力互通。实现一键式协同处理：用户通过单一指令即可调用iTest技能，自动处理EA平台故障案例，形成AI闭环分析能力。\n\n关键举措：搭建统一规范、信息清晰的GUI操作界面，统一测试业务操作标准，解决线下表格混乱、口径不一致问题。打通Workspace流量入口，实现员工便捷快速访问，提升平台普及率与使用率。推进iTest工具和功能模块化封装，将平台各类测试工具沉淀为通用Skills，支持CLI、智能体调用。搭建平台实时运营监控体系，基于真实使用数据、效率数据持续迭代功能，优化用户体验与测试流程。\n\nQ3 & Q4工作重点：Q3 平台开发与基础落地阶段完成iTest整体界面开发与标准化GUI搭建，统一全平台操作规范。完成Condition Table线上功能开发、灰度验证，实现基础线上编辑能力，启动替代传统Excel工作流。完成Fuse Control Table、Test Methods、Test Management、DFT、EFA Tools核心模块开发与联调。打通Workspace及官网访问入口，完成基础环境部署，上线AI自然语言编辑基础能力。Q4 能力迭代与生态打通阶段全面推行Condition Table线上化，完成PTE全员替换Excel落地，达成日均耗时提效指标。完成iTest各类测试能力Skill化封装，完善平台可调用技能生态。打通iTest与EA系统生态联动，实现单指令跨平台调用、自动处理EA案例业务。上线运营数据监控平台，基于用户使用数据持续优化功能，彻底优化传统测试业务顽疾，固化标准化测试流程。\n\nBusiness KPI：测试场景-PTE Agent - 25%\n基本目标：聚焦PTE测试场景中高重复、强SOP、模式固定、日常高频的工作，重点围绕量产产线Hold处置、TTR测试成本优化、Program Release版本验证三大确定性场景，打造PTE专属AI Agent。将工程师标准化、流程化的重复分析工作AI化、工具化，大幅降低人工重复工作量，统一分析标准，提升量产与研发测试问题处置效率。完成PTE Agent场景梳理与能力落地，聚焦三大核心固定流程场景：产线Monitor异常Lot自动Hold处置、TTR测试精简分析、Program Release上线验证分析。处置500+ lots/month，单个lot处置时间1hrs→5min，实现量产日常简单问题AI自动处置，针对SBL、SYL、SFL触发的产线Hold异常Lot，依托标准化SOP完成AI辅助分析与处置建议输出，替代大量人工常规研判工作。实现10+ TTR AI分析推荐/month。完成TTR测试精简、良率分析、成本优化等固定套路流程的Skill化、CI化改造，实现标准化分析流程复用。实现20+ Program Release标准化验证AI辅助分析/month，实现AI one wafer & 3 lots 验证流程。\n\n挑战目标：实现量产Hold问题规模化AI全自动闭环处置：达成每月AI自动处置异常Lot 700+批次，全覆盖SBL、SYL、SFL常规产线风险场景；将单Lot人工处置时长从1小时压缩至3分钟，常规简单问题AI自动处置覆盖率超90%，基本替代人工常规研判，大幅削减量产运维重复性工时。建成常态化TTR智能优化机制：完成TTR测试精简、成本优化全流程Skill化、CI化常态化落地，每月稳定产出15+条高质量AI分析优化建议，精准支撑测试迭代降本，形成可自动迭代的测试成本优化体系。实现Program Release版本验证全流程智能化落地：每月完成25+次版本上线AI自动化验证，全覆盖One Wafer & 3 Lots touchdown标准流程，实现版本发布验证标准化、无人化、可追溯，有效规避人为漏测、误判风险。建成可复用的PTE测试AI知识库与Agent体系：沉淀全场景测试SOP与历史故障根因，实现同类问题智能复用、快速复盘；完成PTE Agent全生态打通，支持跨平台一键调用，实现三大核心场景规模化、常态化智能化运转，形成可对外复用的测试AI标准化解决方案。\n\n关键举措：搭建标准化、可复用的PTE测试Agent基础框架，统一测试场景AI能力调度、流程调用、结果输出规范，支撑产线Hold处置、TTR分析、Program Release验证三大核心场景能力快速落地与迭代。专项搭建适配测试Agent运行的专属知识库，批量沉淀量产SOP、常规故障根因、标准化分析套路、版本验证规范等核心数据，为AI智能研判、自动分析、问题复盘提供精准数据支撑。基于自研Agent框架，完成三大高频测试场景能力Skill化、CI化封装，打通平台生态调用链路，实现能力可复用、可一键调度、可规模化落地。持续迭代优化Agent推理逻辑与知识库内容，不断提升AI分析准确率、问题覆盖率，实现简单场景全自动闭环处置、复杂场景高效辅助分析。\n\nQ3 & Q4工作重点：Q3 场景梳理与基础能力落地完成PTE Agent核心场景确权，锁定产线Hold处置、TTR分析、Program Release三大落地场景，淘汰高不确定、难落地场景。全面梳理三类场景标准SOP、固定分析套路、历史常规Case，完成流程拆解与AI适配方案设计。完成产线Monitor异常Lot Hold处置AI基础能力开发，实现常规问题AI辅助研判与处置建议输出。完成TTR、Program Release固定分析流程的Skill化改造，上线基础AI辅助分析功能。Q4 能力迭代与规模化落地迭代优化PTE Agent分析逻辑，提升常规量产问题AI识别准确率，沉淀同类问题根因知识库。打通平台生态调用能力，实现三大场景AI分析技能可被生态一键调用，提升使用便捷性。规模化落地推广，覆盖日常量产Hold处置、月度TTR优化、版本Release验证全场景，量化人工提效成果。完成场景能力复盘固化，形成PTE测试AI标准化处置体系，支撑后续更多测试场景智能化迭代。\n\nBusiness KPI：设计场景-通用研发管理 - 20%\n基本目标：搭建通用研发管理平台，覆盖DE-DDR、DE-LP、TSA等核心业务部门，打通日常办公、项目流程、EDA研发、问题闭环全链路数据节点。构建L2级研发过程数据体系与知识管理能力，同时面向PDC管理层打造可视化、有体感的AI智能应用，实现研发过程可管、数据可查、人力可控、知识可沉淀。完成通用研发管理平台规划与上线，覆盖多业务部门，打通日报、周报、会议纪要、项目管控全流程信息节点，落地DCM checklist、设计签核等通用流程能力。落地PDC管理层AI智能应用能力，上线人力基线分析、Roadmap人力匹配、行业动态智能收集与洞察Skills，实现管理决策数字化、智能化。落地DFMEA、设计检查手册、问题追溯、EDA设计签核四大核心场景能力，完成研发L2级过程数据采集与沉淀。\n\n挑战目标：落地研发正向&反向流程闭环：串联项目关键节点、交付件、EDA环境数据；统一收录设计、测试各类问题，搭建专属Issue Debug追溯平台。搭建标准化工作关联体系：通过软标签关联日报工作与对应项目，打通XinPLM工时填报、团队人力分布数据，实现日常工作、工时、人力的统一管理。\n\n关键举措：深耕研发业务场景，针对设计类高门槛业务，依托AI产品经理深度吃透研发流程、设计规范与业务痛点，保障产品设计贴合真实落地需求。聚焦管理侧价值落地，打造高体感的AI管理应用与产品，推动PDC管理层AI数字化转型，争取更多管理资源与行政支持，助力项目规模化落地。重构升级日报系统，依托软标签能力实现日报内容精准归属对应项目，串联打通日报工作内容、团队人力分布、项目工时数据，实现人力精细化、可视化管理。开展全业务线调研与产品设计，对齐DDR、LP、TSA多部门研发流程需求，落地DCM、Checklist、设计签核等通用标准化流程平台能力。\n\nQ3 & Q4工作重点：Q3 调研设计与基础能力落地完成DDR、LP、TSA核心部门业务调研，梳理研发流程、会议、日报周报、项目管控、DCM流程等核心需求，输出完整产品方案。完成通用研发管理平台基础框架搭建，上线日报、周报、会议纪要、项目流程管控基础功能。落地软标签关联机制，实现日报工作与项目绑定，打通XinPLM工时、团队人力分布数据链路。研发PDC管理层AI应用能力，上线人力基线分析、Roadmap人力匹配、行业动态洞察等AI Skills。Q4 体系闭环与AI能力落地完善项目正向、反向双链路管控，实现项目节点、交付件、EDA数据、设计&测试Issue全串联闭环。实现L2级研发数据完整沉淀，落地设计场景知识管理系统。完成DFMEA、Checklist、设计签核、Issue Debug四大场景基础功能开发，初步实现L2过程数据采集。全量落地通用研发管理流程，完成多部门规模化试用，固化研发治理标准与知识资产，完成年度目标验收。\n\nLearning Item：电路设计和测试领域AI人才培养 - 10%\n基本目标：培养5名以上AI高潜质员工，围绕部门AI数字化业务，针对社招在岗员工、PDC跨部门NCG新人，开展体系化AI培训与实战赋能，批量培养具备AI业务思维的复合型研发测试人才。参与搭建PDC设计&测试场景AI培训体系，完成在岗员工轮训与PDC新人AI赋能，落地实战课题，实现全员会用AI工具、能解决基础业务问题。\n\n挑战目标：培养7名以上AI高潜质员工，沉淀可复用的AI人才培养课程与实战体系，孵化核心AI业务骨干，形成人人懂AI、用AI的团队数字化氛围，支撑部门长期AI迭代。\n\n关键举措：针对社招员工开展业务AI实战培训，结合平台落地案例提升AI落地能力。面向PDC新人开展AI通识赋能，植入数字化、智能化业务思维。搭建场景化课程与实战结业机制，以真实业务课题验收培养成果。\n\nQ3 & Q4工作重点：Q3搭建标准化培训课件，启动在岗员工与NCG新人AI培训，落地基础实战课题。Q4深化高阶实战培养，复盘筛选潜力人才，固化长期可复用的AI人才培养体系。\n\nBonus Item：AI测试向量自动生成（Test Pattern Auto Generation）- 2026年以前期研究为主 - 10%\n基本目标：联合清华大学、精智达国产机台，敲定AI自动生成测试代码的技术方案，完成可行性验证。打通AI生成、格式适配、机台加载使用全流程，输出代码可直接用于量产测试，Program Check无异常。实现80%基础测试模块AI自动生成，替代人工编写，各项指标满足量产标准。落地至少一个实际产品项目，完成FSO测试代码试点验证，运行稳定可用。\n\n挑战目标：联合清华攻克复杂测试场景的测试代码自动生成难题。整体测试代码开发效率提升40%以上，FSO测试代码验证周期缩短30%。落地标准化AI测试代码生成工具，适配精智达国产机台，支持多项目复用、跨平台适配。\n\n关键举措：聚焦国产测试生态，依托清华&精智达联合实验室，集中资源完成国产机台适配与方案落地。推进测试代码技术转型，从传统爱得万ATL专属语言转为通用类C语言，降低AI生成难度，加速AI技术落地应用。搭建完善、可落地的AI测试代码自动生成平台，实现代码快速生成、自动校验，支持跨产品、跨测试平台复用。重点攻坚测试代码地址转换核心技术难点，梳理各类场景地址映射规则，通过算法优化+规则库沉淀解决适配难题，保障AI生成代码准确可用。\n\nQ3 & Q4工作重点：Q3 技术方案确认阶段确认测试PatternAI生成技术方案，完成内部评审与资源对齐。对接清华、精智达联合团队，明确技术迭代方向，敲定ATL转类C语言改造方案。Q4 初期研究阶段梳理测试代码地址转换规则，攻克核心技术难点，搭建基础规则库。开发基础AI生成工具与校验功能，完成基础模块代码生成与适配验证。"}

let imaData = JSON.parse(JSON.stringify(EMBEDDED_IMA));
// 默认显示最新年份
let selectedYear = (()=>{const ys=new Set();EMBEDDED_MONTHLY.forEach(r=>ys.add(parseInt(r.month.slice(0,4))));return[...ys].sort().pop()||'all';})();

// ==================== Utils ====================
const fmt = n => n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI = n => Math.round(n).toLocaleString('zh-CN');
const fmtPct = n => (n*100).toFixed(1)+'%';

function getYear(m) { return parseInt(m.month.slice(0,4)); }
function getAllYears() { const ys = new Set(); salaryData.forEach(r => ys.add(getYear(r))); return [...ys].sort(); }

// ==================== Stats ====================
function getYearStats(data) {
  const totalShould = data.reduce((s,r)=>s+r.shouldPay,0);
  const totalNet = data.reduce((s,r)=>s+r.netPay,0);
  const totalDeduct = data.reduce((s,r)=>s+r.deduct,0);
  const avgNet = data.length>0 ? totalNet/data.length : 0;
  return {count:data.length,totalShould,totalNet,totalDeduct,avgNet};
}

function getLatestBase() {
  if (salaryData.length===0) return 0;
  return salaryData[salaryData.length-1].base;
}

function renderStats() {
  const filtered = selectedYear==='all' ? salaryData : salaryData.filter(r=>getYear(r)===selectedYear);
  const s = getYearStats(filtered);
  const latestBase = getLatestBase();
  const container = document.getElementById('salaryStats');
  container.innerHTML = [
    {v:'¥'+fmtI(s.totalShould), l:'应发合计'},
    {v:'¥'+fmtI(s.totalNet),    l:'实发合计'},
    {v:'¥'+fmtI(Math.round(s.avgNet)), l:'月均实发'},
    {v:'¥'+fmtI(s.totalDeduct), l:'扣款合计'},
    {v:fmtPct(s.totalNet/(s.totalShould||1)), l:'实发率'},
    {v:'¥'+fmtI(latestBase),    l:'当前基本工资'},
  ].map(x=>`<div class="salary-stat highlight"><div class="stat-val">${x.v}</div><div class="stat-label">${x.l}</div></div>`).join('');
}

function renderYearTabs() {
  const years = getAllYears().reverse();

// ==================== Chart ====================
function drawBarChart() {
  const canvas = document.getElementById('salaryChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W=rect.width, H=250;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const filter = selectedYear==='all' ? salaryData : salaryData.filter(r=>getYear(r)===selectedYear);
  // 时间顺序（旧→新），全部模式下取最近 36 个月
  let data = filter;
  if (selectedYear==='all' && data.length>36) data = data.slice(-36);

  const pad={top:24,right:24,bottom:40,left:52};
  const pw=W-pad.left-pad.right, ph=H-pad.top-pad.bottom;

  ctx.clearRect(0,0,W,H);

  if (data.length===0) return;

  const maxVal = Math.max(...data.map(r=>Math.max(r.shouldPay,r.netPay)));
  const yMax = Math.ceil(maxVal/50000)*50000||50000;
  const yTicks=5;

  // grid
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;
  for(let i=0;i<=yTicks;i++){
    const y=pad.top+(ph/yTicks)*i;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
    ctx.fillStyle='#9aa1b2';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(((yMax-(yMax/yTicks)*i)/10000).toFixed(0)+'w',pad.left-6,y+4);
  }

  const barW=Math.min(18, pw/data.length/2.6);
  const gap=pw/data.length;

  data.forEach((r,i)=>{
    const x=pad.left+gap*i+gap/2-barW;
    const drawBar=(val,color)=>{
      const h=Math.max(0,(val/yMax)*ph);
      const y=pad.top+ph-h;
      ctx.fillStyle=color;
      ctx.beginPath();ctx.roundRect(x,y,barW,h,[3,3,0,0]);ctx.fill();
    };
    drawBar(r.shouldPay,'rgba(240,185,11,0.55)');
    drawBar(r.netPay,'rgba(0,212,170,0.7)');
  });

  // X labels
  data.forEach((r,i)=>{
    const x=pad.left+gap*i+gap/2;
    ctx.fillStyle='#9aa1b2';ctx.font='9px sans-serif';ctx.textAlign='center';
    const lbl = data.length>24 ? (parseInt(r.month.slice(5))===1||i===0||i===data.length-1?r.month.slice(2):'') : r.month.slice(2);
    ctx.fillText(lbl,x,H-pad.bottom+16);
  });

  // legend
  const lx=W-pad.right-90,ly=4;
  ctx.fillStyle='rgba(240,185,11,0.7)';ctx.fillRect(lx,ly,10,10);
  ctx.fillStyle='#5a6378';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText('应发',lx+14,ly+9);
  ctx.fillStyle='rgba(0,212,170,0.8)';ctx.fillRect(lx+40,ly,10,10);
  ctx.fillText('实发',lx+54,ly+9);
}

function drawPieChart() {
  const canvas=document.getElementById('salaryPie');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width,H=250;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  // Use the data currently filtered
  const filter = selectedYear==='all' ? salaryData : salaryData.filter(r=>getYear(r)===selectedYear);

  const cats=[
    {key:'base',label:'基本工资',color:'#4d8af0'},
    {key:'allowance',label:'津贴',color:'#a277ff'},
    {key:'bonus',label:'奖金',color:'#f0b90b'},
    {key:'overtime',label:'加班费',color:'#ff6b9d'},
    {key:'annual',label:'年终奖',color:'#ff5577'},
    {key:'other',label:'其他',color:'#00d4aa'},
  ];
  const totals={};
  cats.forEach(c=>{totals[c.key]=filter.reduce((s,r)=>s+(r[c.key]||0),0)});
  const grand=Object.values(totals).reduce((s,v)=>s+v,0);
  const slices=cats.filter(c=>totals[c.key]>0);

  const cx=W*0.35,cy=H/2,r=Math.min(cx-10,cy-16,88);
  let angle=-Math.PI/2;
  slices.forEach(s=>{
    const sa=(totals[s.key]/grand)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sa);ctx.closePath();
    ctx.fillStyle=s.color;ctx.fill();
    const mid=angle+sa/2;
    const lx=cx+Math.cos(mid)*(r+14),ly=cy+Math.sin(mid)*(r+14);
    const pct=((totals[s.key]/grand)*100).toFixed(1);
    ctx.fillStyle='#5a6378';ctx.font='10px sans-serif';
    ctx.textAlign=mid>Math.PI/2||mid<-Math.PI/2?'right':'left';
    ctx.fillText(s.label+' '+pct+'%',lx+(mid>Math.PI/2||mid<-Math.PI/2?-4:4),ly+4);
    angle+=sa;
  });
}

// ==================== Excel Parsing ====================
function parseExcel(wb){
  // Parse monthly sheet
  const monthlySheet = wb.Sheets[wb.SheetNames[0]];
  const mRows = XLSX.utils.sheet_to_json(monthlySheet,{header:1,defval:null});
  let headerIdx=-1;
  for(let i=0;i<mRows.length;i++){if(mRows[i]&&mRows[i].some(c=>c&&String(c).includes('基本工资'))){headerIdx=i;break;}}
  if(headerIdx<0) return null;

  const monthly=[];
  for(let i=headerIdx+1;i<mRows.length;i++){
    const r=mRows[i];if(!r||!r[0])continue;
    // Handle datetime or string month
    let monthStr='';
    const raw=r[0];
    if(raw instanceof Date){monthStr=raw.getFullYear()+'-'+String(raw.getMonth()+1).padStart(2,'0');}
    else if(typeof raw==='number'){const d=XLSX.SSF.parse_date_code(raw);monthStr=d.y+'-'+String(d.m).padStart(2,'0');}
    else{const s=String(raw).trim();if(!s||!/^\d/.test(s))continue;monthStr=s.slice(0,7);}
    if(!/^\d{4}-\d{2}$/.test(monthStr))continue;
    monthly.push({
      month:monthStr,
      base:Number(r[1])||0,allowance:Number(r[2])||0,bonus:Number(r[3])||0,
      overtime:Number(r[4])||0,annual:Number(r[5])||0,other:Number(r[6])||0,
      shouldPay:Number(r[7])||0,netPay:Number(r[8])||0,deduct:Number(r[9])||0
    });
  }
  if(monthly.length===0)return null;

  // Parse annual sheet (if exists)
  let annual=[];
  if(wb.SheetNames.length>1){
    const annualSheet=wb.Sheets[wb.SheetNames[1]];
    const aRows=XLSX.utils.sheet_to_json(annualSheet,{header:1,defval:null});
    headerIdx=-1;
    for(let i=0;i<aRows.length;i++){if(aRows[i]&&aRows[i].some(c=>c&&String(c).includes('年份'))){headerIdx=i;break;}}
    if(headerIdx>=0){
      for(let i=headerIdx+1;i<aRows.length;i++){
        const r=aRows[i];if(!r||!r[0])continue;
        const yr=Number(r[0]);
        if(!yr||isNaN(yr))continue;
        const label=String(r[0]).includes('累计')?String(r[0]):null;
        annual.push({
          year:yr,label,
          shouldPay:Number(r[1])||0,netPay:Number(r[2])||0,deduct:Number(r[3])||0,
          deductRate:Number(r[4])||0,
          shouldYoY:typeof r[5]==='number'?r[5]:(r[5]&&String(r[5])!=='-'?Number(r[5]):'-'),
          netYoY:typeof r[6]==='number'?r[6]:(r[6]&&String(r[6])!=='-'?Number(r[6]):'-'),
        });
      }
    }
  }

  return {monthly,annual};
}

function handleUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const parsed=parseExcel(wb);
      if(parsed&&parsed.monthly.length>0){
        salaryData=parsed.monthly;
        if(parsed.annual.length>0)annualData=parsed.annual;
        localStorage.setItem('dash_salary_v2',JSON.stringify(parsed.monthly));
        localStorage.setItem('dash_annual_v2',JSON.stringify(parsed.annual.length>0?parsed.annual:annualData));
        selectedYear='all';
        renderAllSalary();
      }else{alert('未能解析工资数据，请确认文件格式正确。');}
    }catch(err){alert('读取失败: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function updateClock(){
  const now=new Date();
  document.getElementById('clockTime').textContent=[now.getHours(),now.getMinutes(),now.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  document.getElementById('clockDate').textContent=now.getFullYear()+'年'+String(now.getMonth()+1).padStart(2,'0')+'月'+String(now.getDate()).padStart(2,'0')+'日';
  document.getElementById('clockWeekday').textContent=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
}

async function syncImaFromProxy(){
  const cfg=loadImaConfig();
  if(!cfg||!cfg.clientId||!cfg.apiKey)return{ok:false,reason:'no_config'};
  try{
    const r=await fetch('http://localhost:8765/health',{signal:AbortSignal.timeout(2000)});
    if(!r.ok)return{ok:false,reason:'proxy_offline'};
  }catch(e){return{ok:false,reason:'proxy_offline'};}

  try{
    const r=await fetch('http://localhost:8765/agent-interface/knowledge-bases',{
      headers:{'X-Ima-Client-Id':cfg.clientId,'X-Ima-Api-Key':cfg.apiKey}
    });
    if(!r.ok)return{ok:false,reason:'api_'+r.status};
    const data=await r.json();
    // 兼容多种响应结构
    let kbs=null;
    if(data.data&&data.data.info_list) kbs=data.data.info_list;
    else if(data.knowledge_bases) kbs=data.knowledge_bases;
    else if(Array.isArray(data)) kbs=data;
    if(!kbs||!Array.isArray(kbs))return{ok:false,reason:'no_data'};

    // 归一化为统一格式
    kbs=kbs.map(kb=>({
      id: kb.kb_id||kb.id,
      name: kb.kb_name||kb.name,
      content_count: parseInt(kb.content_count||0),
      description: kb.description||'',
      cover_url: kb.cover_url||'',
      type: kb.base_type||'知识库'
    }));

    const newData={knowledge_bases:kbs,contents:{},notes:{},lastSync:Date.now()};

    // 拉取每个知识库的内容
    for(const kb of kbs){
      try{
        const lr=await fetch(`http://localhost:8765/agent-interface/knowledge-list?knowledge_base_id=${encodeURIComponent(kb.id)}`,{headers:{'X-Ima-Client-Id':cfg.clientId,'X-Ima-Api-Key':cfg.apiKey}});
        if(lr.ok){
          const ld=await lr.json();
          const list=ld.data&&ld.data.knowledge_list?ld.data.knowledge_list:(ld.knowledge_list||ld.list||[]);
          // 归一化字段: note_id 优先从 notebook_ext_info 提取，其次从 notebook_id
          newData.contents[kb.id]=list.map(item=>({
            ...item,
            note_id:item.notebook_ext_info&&item.notebook_ext_info.notebook_id||item.notebook_id||item.note_id||''
          }));
        }
      }catch(e){}
    }

    // 拉取每个笔记的内容（保留 JSON 结构以便渲染格式）
    for(const kbId in newData.contents){
      for(const c of newData.contents[kbId]){
        if(c.media_type===11&&c.note_id){
          try{
            const nr=await fetch(`http://localhost:8765/agent-interface/note-content?note_id=${encodeURIComponent(c.note_id)}`,{headers:{'X-Ima-Client-Id':cfg.clientId,'X-Ima-Api-Key':cfg.apiKey}});
            if(nr.ok){
              const nd=await nr.json();
              // 保存原始 JSON 字符串，渲染时再解析
              const content=nd.data&&nd.data.content?nd.data.content:(nd.content||'');
              newData.notes[c.note_id]={title:c.title,content};
            }
          }catch(e){}
        }
      }
    }

    return{ok:true,data:newData};
  }catch(e){return{ok:false,reason:'error:'+e.message};}
}

async function syncIma(){
  const btn=document.getElementById('imaSyncBtn');
  const bar=document.getElementById('imaStatusBar');
  btn.classList.add('syncing');
  bar.className='ima-status-bar syncing';
  bar.innerHTML='<span class="sync-dot"></span>同步中...';

  const res=await syncImaFromProxy();
  btn.classList.remove('syncing');

  if(res.ok){
    imaData=res.data;
    saveImaData(imaData);
    renderImaKbList();
    bar.className='ima-status-bar ok';
    bar.innerHTML=`<span class="sync-dot"></span>已同步 ${formatSyncTime(imaData.lastSync)}`;
  }else{
    bar.className='ima-status-bar error';
    if(res.reason==='proxy_offline'){
      bar.innerHTML=`<span class="sync-dot"></span>代理未启动 · <a class="ima-start-link" id="imaStartLink">点击启动服务</a> <span style="color:var(--text-dim);font-size:.6rem;">(一次性,开机自启)</span>`;
      const sl=document.getElementById('imaStartLink');
      if(sl)sl.onclick=startImaProxyService;
    }else if(res.reason==='no_config'){
      bar.innerHTML='<span class="sync-dot"></span>请先在设置中填写 Client ID 和 API Key';
    }else{
      bar.innerHTML=`<span class="sync-dot"></span>同步失败: ${res.reason}`;
    }
  }
}

function formatSyncTime(ts){
  if(!ts)return'从未';
  const d=new Date(ts);
  const now=Date.now();
  const diff=now-ts;
  if(diff<60000)return'刚刚';
  if(diff<3600000)return Math.floor(diff/60000)+' 分钟前';
  if(diff<86400000)return Math.floor(diff/3600000)+' 小时前';
  return d.getMonth()+1+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

async function connectIma(){
  const clientId=document.getElementById('imaClientId').value.trim();

  status.textContent='保存中...';status.className='ima-api-status pending';
  saveImaConfig({clientId,apiKey});
  status.textContent='已配置';status.className='ima-api-status ok';
  // 自动触发一次同步
  await syncIma();
}

// 把 ima 笔记内容渲染为 HTML
// 输入: JSON 字符串(由 target_content_format=2 返回) 或 纯文本
function renderImaNoteContent(raw){
  if(!raw)return'';
  let blocks;
  try{blocks=JSON.parse(raw);}catch{return escHtml(raw);}
  if(!Array.isArray(blocks))return escHtml(raw);
  return blocks.map(block=>renderImaBlock(block)).join('');
}

function renderImaBlock(b){
  if(!b)return'';
  const text=b.children?b.children.map(c=>renderInline(c)).join(''):'';
  const style=[];
  if(b.align==='center')style.push('text-align:center');
  else if(b.align==='right')style.push('text-align:right');
  else if(b.align==='justify')style.push('text-align:justify');
  const astyle=style.length?' style="'+style.join(';')+'"':'';

  switch(b.type){
    case 'h1':return`<h1 class="ima-h1"${astyle}>${text}</h1>`;
    case 'h2':return`<h2 class="ima-h2"${astyle}>${text}</h2>`;
    case 'h3':return`<h3 class="ima-h3"${astyle}>${text}</h3>`;
    case 'p': return`<p class="ima-p"${astyle}>${text}</p>`;
    case 'hr':return'<hr class="ima-hr">';
    case 'blockquote':return`<blockquote class="ima-bq">${text}</blockquote>`;
    case 'code':return`<pre class="ima-pre"><code>${text}</code></pre>`;
    case 'ul':case 'ol':case 'li':return text; // 简化
    case 'img':
      return b.url?`<img class="ima-img" src="${escAttr(b.url)}" alt="${escAttr(b.alt||'')}">`:'';
    default:
      // 默认当成段落
      return text?`<p class="ima-p"${astyle}>${text}</p>`:'';
  }
}

function renderInline(c){
  if(typeof c==='string')return escHtml(c);
  if(!c||!c.text)return'';
  let s=escHtml(c.text);
  if(c.bold)s=`<strong>${s}</strong>`;
  if(c.italic)s=`<em>${s}</em>`;
  if(c.underline)s=`<u>${s}</u>`;
  if(c.strikethrough)s=`<s>${s}</s>`;
  if(c.code)s=`<code class="ima-code-inline">${s}</code>`;
  if(c.color)s=`<span style="color:${escAttr(c.color)}">${s}</span>`;
  if(c.bgColor||c.background)s=`<span style="background:${escAttr(c.bgColor||c.background)}">${s}</span>`;
  if(c.highlight)s=`<mark>${s}</mark>`;
  if(c.url||c.href)s=`<a class="ima-link" href="${escAttr(c.url||c.href)}" target="_blank" rel="noopener">${s}</a>`;
  return s;
}

function escHtml(s){const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};return String(s||'').replace(/[&<>"']/g,c=>m[c]);}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// ==================== 体重日历 ====================
let weightData=[];
let weightCalYear,weightCalMonth;

async function loadWeight(){
  const loading=document.getElementById('weightLoading');
  loading.style.display='block';
  try{
    const r=await fetch('http://localhost:8765/local/weight');
    if(r.ok) weightData=await r.json();
  }catch(e){}
  loading.style.display='none';
  renderWeight();
}

function getWeightForDate(dateStr){
  return weightData.find(w=>w.date===dateStr);
}

function renderWeightStats(){
  const container=document.getElementById('weightStats');
  if(weightData.length===0){
    container.innerHTML=`<div class="weight-stat" style="flex-basis:100%;"><div class="v" style="color:var(--text-dim);">--</div><div class="l">暂无数据</div></div>`;
    return;
  }
  const sorted=[...weightData].sort((a,b)=>a.date.localeCompare(b.date));
  const latest=sorted[sorted.length-1];
  const first=sorted[0];
  const weights=sorted.map(w=>w.weight_kg);
  const maxW=Math.max(...weights);
  const minW=Math.min(...weights);
  const diff=(latest.weight_kg-first.weight_kg).toFixed(1);
  const diffColor=diff>0?'#fb7185':diff<0?'#00d4aa':'var(--text-dim)';
  const diffSign=diff>0?'+':'';
  container.innerHTML=[
    {v:latest.weight_kg+'kg',l:`最新 ${latest.date.slice(5)}`},
    {v:minW+'kg',l:'最低'},
    {v:maxW+'kg',l:'最高'},
    {v:diffSign+diff+'kg',l:'变化',color:diffColor},
  ].map(s=>`<div class="weight-stat"><div class="v" style="${s.color?'color:'+s.color:''}">${s.v}</div><div class="l">${s.l}</div></div>`).join('');
}

function renderWeightCalendar(){
  const titleEl=document.getElementById('weightCalTitle');
  titleEl.textContent=`${weightCalYear} 年 ${weightCalMonth+1} 月`;
  const daysEl=document.getElementById('weightCalDays');
  const first=new Date(weightCalYear,weightCalMonth,1);
  const last=new Date(weightCalYear,weightCalMonth+1,0);
  const startDow=first.getDay();
  const totalDays=last.getDate();
  const today=new Date();
  let html='';
  for(let i=0;i<startDow;i++)html+='<div class="weight-day empty"></div>';
  for(let d=1;d<=totalDays;d++){
    const dateStr=`${weightCalYear}-${String(weightCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const w=getWeightForDate(dateStr);
    const isToday=today.getFullYear()===weightCalYear&&today.getMonth()===weightCalMonth&&today.getDate()===d;
    const cls=['weight-day'];
    if(w)cls.push('has-data');
    if(isToday)cls.push('today');
    html+=`<div class="${cls.join(' ')}" title="${w?dateStr+' '+w.weight_kg+'kg'+(w.note?' ('+w.note+')':''):dateStr}">`;
    html+=`<div class="wd">${d}</div>`;
    if(w){
      html+=`<div class="ww">${w.weight_kg}</div>`;
      if(w.note)html+=`<div class="wn">${w.note}</div>`;
    }
    html+='</div>';
  }
  daysEl.innerHTML=html;
}

function renderWeight(){
  renderWeightStats();
  renderWeightCalendar();
}

function navigateMonth(delta){
  weightCalMonth+=delta;
  if(weightCalMonth<0){weightCalMonth=11;weightCalYear--;}
  if(weightCalMonth>11){weightCalMonth=0;weightCalYear++;}
  renderWeightCalendar();
}

function goToToday(){
  const t=new Date();
  weightCalYear=t.getFullYear();
  weightCalMonth=t.getMonth();
  renderWeightCalendar();
}
